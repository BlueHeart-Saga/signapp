name: Backend CI/CD (Docker)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Extract metadata (tags)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: blueheartsaga/signapp-backend
          tags: |
            type=raw,value=latest
            type=sha

      # 5️⃣ Build & Push Docker Image (with cache)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=blueheartsaga/signapp-backend:latest
          cache-to: type=inline

      # 6️⃣ 🔥 Restart Azure Web App (AUTO DEPLOY)
      - name: Restart Azure Web App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --name signapp-backend-docker \
              --resource-group AI-Esign