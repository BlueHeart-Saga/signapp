name: Backend CI/CD (Docker)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Login Docker
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build
      - run: docker build -t blueheartsaga/signapp-backend:latest ./backend

      # 4️⃣ Push
      - run: docker push blueheartsaga/signapp-backend:latest

      # 5️⃣ 🔥 FORCE AZURE TO UPDATE
      - name: Deploy to Azure (refresh container)
        uses: azure/webapps-deploy@v3
        with:
          app-name: signapp-backend-docker
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: blueheartsaga/signapp-backend:latest